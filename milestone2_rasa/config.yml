language: en

pipeline:
# --- PIPELINE WITH CRF & DIET ---
- name: WhitespaceTokenizer
- name: RegexFeaturizer
  use_lookup_tables: true # <-- ADDED THIS
- name: LexicalSyntacticFeaturizer
- name: CountVectorsFeaturizer
- name: CountVectorsFeaturizer
  analyzer: "char_wb"
  min_ngram: 1
  max_ngram: 4
# Add CRFEntityExtractor before DIET
- name: CRFEntityExtractor
- name: DIETClassifier
  epochs: 100
  entity_recognition: true # DIET still tries too
  use_lookup_tables: true # <-- ADDED THIS
- name: EntitySynonymMapper
- name: FallbackClassifier
  threshold: 0.3
  ambiguity_threshold: 0.1
# --- END OF PIPELINE ---

policies:
# ... (policies are unchanged) ...
- name: MemoizationPolicy
- name: RulePolicy
- name: UnexpecTEDIntentPolicy
  max_history: 5
  epochs: 100
- name: TEDPolicy
  max_history: 5
  epochs: 100

